<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Latihan 1</title>
</head>
<body>
    <form>
        <table>
            <tr>
                <td>Nama Lengkap:</td>
                <td><input type="text" placeholder="Masukan Nama Lengkap Anda" maxlength="10" required/></td>
            </tr>
            <tr>
                <td>Username:</td>
                <td><input type="text" placeholder="Masukan Username Anda" maxlength="8" required/></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" placeholder="Masukan Password" maxlength="20" required ></td>
            </tr>
            <tr>
                <td>Tanggal Lahir:</td>
                <td><input type="date" name="birth" required></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td><input type="email" placeholder="Masukan Alamat e-mail Anda"></td>
            </tr>
            <tr>
                <td>Telepon:</td>
                <td><input type="tel" placeholder="Masukan No Telpon Anda" maxlength="12" required></td>
            </tr>
            <tr>
                <td></td>
                <td> <input type="submit" value="Buat Akun Saya"></td>
            </tr>
        </table>
    </form>
</body>
</html>
