<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas prak2</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <style>
    body {
        margin: 0;
        height: 100vh;              
        display: flex;              
        flex-direction: column;     
        align-items: center;        
        justify-content: center;    
        background-color: blue;
    }

    p {
        font-size: 20px;
        color: goldenrod;
        margin: 10px;
    }

    .buttondiv {
        display: flex;
        justify-content: center;    
        gap: 15px;                  
        margin-top: 20px;
    }

    button {
        padding: 10px 40px;
        font-size: 20px;
        color: blue;
        border-radius: 12px;
        cursor: pointer;
        background-color: goldenrod;
    }

    input {
        font-size: 20px;
        padding: 8px;
        border-radius: 12px;
        margin-top: 20px;
    }
    </style>

</head>
<body>

    <p id="test1"></p>
    <p id="test2"></p>
    <input type="text" id="test3" placeholder="Ketik sesuatu..">

    <div class="buttondiv">
        <button id="btn1">Nama</button>
        <button id="btn2">NIM dan Kelas</button>
        <button id="btn3">Input</button>
        
    </div>

    <script>
    $(document).ready(function(){
    $("#btn1").click(function(){
        $("#test1").html("<b>Bhaskoro Prayoga Utomo</b>");
    });
    $("#btn2").click(function(){
        $("#test2").html("<b>250081109 - E</b>");
    });
    $("#btn3").click(function(){
        $("#test3").val("Chelsea punya CWC");
    });
    })
    </script>
</body>

</body>
</html>
