<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas prak2</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script>
    $(document).ready(function(){
    $("#btn1").click(function(){
        $("#test1").text("Hello world!");
    });
    $("#btn2").click(function(){
        $("#test2").html("<b>Hello world!</b>");
    });
    $("#btn3").click(function(){
        $("#test3").val("Dolly Duck");
    });
})
</script>
</head>
<body>
    <body>
    <p id="test1">Teks akan berubah di sini.</p>
    <p id="test2">HTML akan berubah di sini.</p>
    <input type="text" id="test3" value="Nama awal" />

    <br><br>

    <button id="btn1">Ubah Text</button>
    <button id="btn2">Ubah HTML</button>
    <button id="btn3">Ubah Value</button>
</body>

</body>
</html>
