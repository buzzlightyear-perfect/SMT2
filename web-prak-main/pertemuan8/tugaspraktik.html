<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="tugaspraktik.css">
</head>
<body>
  <section class="galeri-wrapper min-vh-100">
    <div class="container-lg">
      <div class="row g-4 row-cols-1 row-cols-sm-2 row-cols-md-3">
        <div class="col">
          <img src="gallery/foto6.jpeg" class="foto-item">
        </div>
        <div class="col">
          <img src="gallery/foto5.jpeg" class="foto-item">
        </div>
        <div class="col">
          <img src="gallery/foto4.jpeg" class="foto-item">
        </div>
        <div class="col">
          <img src="gallery/foto3.jpeg" class="foto-item">
        </div>
        <div class="col">
          <img src="gallery/foto2.jpeg" class="foto-item">
        </div>
        <div class="col">
          <img src="gallery/foto1.jpeg" class="foto-item">
        </div>
      </div>
    </div>
  </section>

  <div class="modal fade" id="gallery-popup" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title popup-title">Preview</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <img src="" class="modal-img popup-img" alt="popup image">
        </div>
        <div class="modal-footer popup-footer">
          <button type="button" class="btn btn-secondary prev-btn">Prev</button>
          <button type="button" class="btn btn-secondary next-btn">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="tugaspraktik.js"></script>
</body>
</html>
